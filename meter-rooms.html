<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>บันทึกมิเตอร์ - The Green Haven</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="./shared/security.js"></script>
  <script src="./shared/audit.js"></script>
  <script src="./shared/meter_data.js"></script>
  <script src="./shared/meter_system.js"></script>
  <script src="./mock-rooms-data.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --green-dark: #1a5c38;
      --green: #2d8653;
      --green-light: #4caf50;
      --green-pale: #e8f5e9;
      --accent: #ff8f00;
      --accent-light: #fff8e1;
      --blue: #1976d2;
      --blue-pale: #e3f2fd;
      --red: #c62828;
      --red-pale: #ffebee;
      --bg: #f4f6f8;
      --card: #fff;
      --text: #1a2332;
      --text-muted: #6b7a8d;
      --border: #e0e6ed;
      --shadow: 0 2px 12px rgba(0,0,0,.08);
      --shadow-hover: 0 8px 24px rgba(0,0,0,.14);
      --radius: 14px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'Sarabun', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .header {
      background: linear-gradient(135deg, var(--green-dark) 0%, var(--green) 60%, #3aa86a 100%);
      color: #fff;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 20px rgba(0,0,0,.25);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: .9rem 0;
    }

    .header-logo {
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,.15);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .header h1 {
      font-size: 1.2rem;
      font-weight: 700;
    }

    .header-nav {
      display: flex;
      gap: 3px;
      flex-wrap: wrap;
    }

    .nav-btn {
      padding: 7px 13px;
      border: none;
      background: rgba(255,255,255,.1);
      color: #fff;
      border-radius: 7px;
      cursor: pointer;
      font-family: 'Sarabun', sans-serif;
      font-size: .85rem;
      transition: all .2s;
      font-weight: 500;
    }

    .nav-btn:hover, .nav-btn.active {
      background: rgba(255,255,255,.25);
    }

    .logout-btn {
      background: rgba(198,40,40,0.2);
      color: #c62828;
      margin-left: auto;
    }

    .logout-btn:hover {
      background: rgba(198,40,40,0.3);
    }

    .main {
      max-width: 1440px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.4rem;
      margin-bottom: 1.5rem;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 1.2rem;
      color: var(--text);
    }

    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      margin-bottom: .4rem;
      font-weight: 600;
      font-size: .9rem;
      color: var(--text);
    }

    input, select {
      width: 100%;
      padding: .7rem .9rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'Sarabun', sans-serif;
      font-size: .9rem;
      transition: all .2s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(45, 134, 83, 0.1);
    }

    .meter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.2rem;
      margin-top: 1.5rem;
    }

    .meter-card {
      background: var(--green-pale);
      border: 2px solid var(--green-light);
      border-radius: var(--radius-sm);
      padding: 1.2rem;
      position: relative;
    }

    .meter-card.filled {
      background: var(--green-pale);
      border-color: var(--green);
    }

    .room-number {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--green-dark);
      margin-bottom: .5rem;
    }

    .meter-input-group {
      margin-bottom: .8rem;
    }

    .meter-input-group label {
      font-size: .8rem;
      margin-bottom: .3rem;
      font-weight: 600;
      color: var(--text);
    }

    .meter-input-group input {
      width: 100%;
      padding: .5rem;
      font-size: .9rem;
    }

    .meter-display {
      background: rgba(255,255,255,0.7);
      padding: .8rem;
      border-radius: var(--radius-sm);
      margin-top: .5rem;
      font-size: .85rem;
    }

    .consumption {
      color: var(--accent);
      font-weight: 700;
    }

    .rate-config {
      background: var(--accent-light);
      border: 2px solid var(--accent);
      border-radius: var(--radius);
      padding: 1.2rem;
      margin-bottom: 1.5rem;
    }

    .rate-input {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .rate-input .form-group {
      margin-bottom: 0;
    }

    .btn-group {
      display: flex;
      gap: .8rem;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }

    button {
      padding: .8rem 1.5rem;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Sarabun', sans-serif;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }

    .btn-primary {
      background: var(--green);
      color: #fff;
      flex: 1;
    }

    .btn-primary:hover {
      background: var(--green-dark);
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }

    .btn-secondary {
      background: var(--border);
      color: var(--text);
      flex: 1;
    }

    .btn-secondary:hover {
      background: #d0d6df;
    }

    .status-badge {
      display: inline-block;
      padding: .4rem .8rem;
      border-radius: 20px;
      font-size: .75rem;
      font-weight: 600;
      margin-top: .5rem;
    }

    .status-filled {
      background: var(--green-light);
      color: #fff;
    }

    .status-empty {
      background: var(--border);
      color: var(--text-muted);
    }

    .alert {
      padding: 1rem;
      border-radius: var(--radius-sm);
      margin-bottom: 1rem;
      font-weight: 600;
    }

    .alert-success {
      background: var(--green-pale);
      border: 2px solid var(--green-light);
      color: var(--green-dark);
    }

    .alert-info {
      background: var(--blue-pale);
      border: 2px solid var(--blue);
      color: var(--blue);
    }

    .alert-warning {
      background: var(--accent-light);
      border: 2px solid var(--accent);
      color: var(--accent);
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-top: .5rem;
    }

    .progress-fill {
      height: 100%;
      background: var(--green-light);
      width: 0%;
      transition: width .3s;
    }

    .month-selector {
      display: flex;
      gap: 1rem;
      align-items: flex-end;
      margin-bottom: 1.5rem;
    }

    .month-selector .form-group {
      margin-bottom: 0;
      flex: 1;
    }

    @media (max-width: 768px) {
      .meter-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 10px;
      }

      .rate-input {
        grid-template-columns: 1fr;
      }

      .month-selector {
        flex-direction: column;
        gap: 10px;
      }

      .header {
        padding: 12px 15px;
      }

      .header-brand {
        font-size: 16px;
      }

      .main {
        padding: 15px;
      }

      .controls {
        flex-direction: column;
        gap: 10px;
      }

      .meter-card {
        padding: 12px;
        border-radius: 8px;
      }

      .meter-label {
        font-size: 12px;
      }

      .meter-value {
        font-size: 16px;
      }

      .meter-input {
        font-size: 13px;
        padding: 10px;
      }

      .button {
        padding: 10px 15px;
        font-size: 13px;
      }

      .rate-config {
        flex-direction: column;
      }

      .rate-group {
        margin-bottom: 12px;
      }

      .rate-group label {
        font-size: 12px;
      }

      .rate-group input {
        font-size: 13px;
        padding: 8px;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
      }

      .header {
        padding: 10px 12px;
      }

      .header-brand {
        font-size: 14px;
      }

      .header-subtitle {
        font-size: 12px;
      }

      .main {
        padding: 10px;
      }

      .controls {
        flex-direction: column;
        gap: 8px;
      }

      .month-selector {
        flex-direction: column;
        gap: 8px;
      }

      .month-selector input,
      .month-selector button {
        font-size: 12px;
        padding: 8px;
        width: 100%;
      }

      .meter-grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 8px;
      }

      .meter-card {
        padding: 10px;
        border-radius: 6px;
        font-size: 12px;
      }

      .meter-label {
        font-size: 11px;
      }

      .meter-value {
        font-size: 14px;
      }

      .meter-input {
        font-size: 12px;
        padding: 8px;
        border-radius: 4px;
      }

      .button {
        padding: 8px 12px;
        font-size: 12px;
        border-radius: 4px;
        width: 100%;
      }

      .section-title {
        font-size: 13px;
        margin: 12px 0 10px 0;
      }

      .rate-config {
        flex-direction: column;
        gap: 8px;
      }

      .rate-group {
        margin-bottom: 10px;
      }

      .rate-group label {
        font-size: 11px;
        display: block;
        margin-bottom: 4px;
      }

      .rate-group input {
        font-size: 12px;
        padding: 7px;
        width: 100%;
        border-radius: 4px;
      }

      .rate-input {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .success-message {
        font-size: 12px;
        padding: 10px;
      }

      .error-message {
        font-size: 12px;
        padding: 10px;
      }
    }

    @media (max-width: 360px) {
      body {
        padding: 8px;
      }

      .header {
        padding: 8px 10px;
      }

      .header-brand {
        font-size: 12px;
      }

      .header-subtitle {
        font-size: 11px;
      }

      .main {
        padding: 8px;
      }

      .meter-grid {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 6px;
      }

      .meter-card {
        padding: 8px;
        font-size: 11px;
      }

      .meter-label {
        font-size: 10px;
      }

      .meter-value {
        font-size: 13px;
      }

      .button {
        padding: 7px 10px;
        font-size: 11px;
      }
    }

    @media (min-width: 1024px) {
      .meter-grid {
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 15px;
      }

      .main {
        padding: 25px;
      }

      .header {
        padding: 15px 25px;
      }
    }

    @media print {
      body {
        padding: 0;
      }

      .header {
        display: none;
      }

      .controls {
        display: none;
      }

      .meter-grid {
        break-inside: avoid;
      }

      .meter-card {
        page-break-inside: avoid;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-brand">
      <div class="header-logo">📊</div>
      <div>
        <h1>บันทึกมิเตอร์</h1>
        <small>The Green Haven - Meter Reading System</small>
      </div>
    </div>
    <div class="header-nav">
      <button class="nav-btn" onclick="window.location.href='/meter_history'">📈 ประวัติ</button>
      <button class="nav-btn" onclick="window.location.href='/dashboard'">🏠 หน้าหลัก</button>
      <button class="nav-btn" onclick="window.location.href='/accounting'">💳 บัญชี</button>
      <button class="logout-btn" onclick="logout()">🚪 ออกจากระบบ</button>
    </div>
  </div>

  <div class="main">
    <div id="alertBox"></div>

    <!-- Rate Configuration -->
    <div class="rate-config">
      <div class="card-title">⚙️ ตั้งค่าอัตราค่าธรรมชาติ</div>
      <div class="rate-input">
        <div class="form-group">
          <label>💧 อัตราค่าน้ำ (บาท/หน่วย)</label>
          <input type="number" id="waterRate" value="18" step="0.01" min="0">
        </div>
        <div class="form-group">
          <label>⚡ อัตราค่าไฟ (บาท/หน่วย)</label>
          <input type="number" id="electricRate" value="7" step="0.01" min="0">
        </div>
      </div>
      <button class="btn-secondary" onclick="saveRates()" style="margin-top: 1rem; width: auto;">💾 บันทึกอัตรา</button>
    </div>

    <!-- Month Selection -->
    <div class="month-selector">
      <div class="form-group" style="margin-bottom: 0;">
        <label>📅 เดือนที่จะบันทึก</label>
        <input type="month" id="meterMonth">
      </div>
      <button class="btn-secondary" onclick="loadPreviousMonth()" style="height: 42px; width: auto;">
        ←  โหลดจากเดือนที่แล้ว
      </button>
      <button class="btn-secondary" onclick="toggleBulkImport()" style="height: 42px; width: auto;">
        📥 นำเข้าจาก CSV
      </button>
    </div>

    <!-- Bulk Import Section (Hidden by default) -->
    <div id="bulkImportSection" style="display: none; margin-bottom: 1.5rem;">
      <div class="card" style="background: #fff8e1; border-left: 4px solid #ffc107;">
        <div class="card-title">📥 นำเข้าข้อมูลมิเตอร์จาก CSV</div>
        <p style="margin-bottom: 1rem; color: #6b7a8d;">
          ไฟล์ CSV ต้องมีคอลัมน์: Room, Water, Electric
        </p>
        <div class="form-group" style="margin-bottom: 1rem;">
          <input type="file" id="csvFile" accept=".csv" style="padding: 0.5rem;">
        </div>
        <div class="btn-group">
          <button class="btn-primary" onclick="importFromCSV()">✅ นำเข้า</button>
          <button class="btn-secondary" onclick="downloadCSVTemplate()">📥 ดาวน์โหลดตัวอย่าง</button>
          <button class="btn-secondary" onclick="toggleBulkImport()">❌ ปิด</button>
        </div>
      </div>
    </div>

    <!-- Meter Input Grid -->
    <div class="card">
      <div class="card-title">📊 บันทึกค่ามิเตอร์ (Nest Building)</div>
      <div id="meterGrid" class="meter-grid"></div>
    </div>

    <!-- Buttons -->
    <div class="btn-group">
      <button class="btn-primary" onclick="submitMeterReadings()">✅ บันทึกและสร้างใบวางบิล</button>
      <button class="btn-secondary" onclick="exportMeterData()" style="flex: 0.5;">📤 ส่งออก CSV</button>
      <button class="btn-secondary" onclick="resetForm()">🔄 รีเซต</button>
    </div>
  </div>

  <script src="./meter-rooms.js"></script>

  <script>
    // Initialize meter page when DOM is ready
    document.addEventListener('DOMContentLoaded', function() {
      // Load mock rooms data if not already in Firebase
      if (!localStorage.getItem('rooms_data')) {
        initMockRoomsData();
      }
      initMeterPage();
    });

    // Override logout in meter.js if needed
    window.logout = function() {
      if (confirm('ต้องการออกจากระบบหรือไม่?')) {
        sessionStorage.removeItem('user');
        window.location.href = '/login';
      }
    };
  </script>
</body>
</html>
