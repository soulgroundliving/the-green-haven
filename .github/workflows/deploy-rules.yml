# Auto-deploy Firestore + Storage + RTDB security rules (and Firestore indexes)
# on push to main.
#
# Why this exists: rules were tested in CI (firestore-rules.yml) but NEVER
# deployed by CI. The only deploy path was a manual `firebase deploy --only
# firestore:rules,storage,database` from a local terminal — which is exactly the
# "deploy from the wrong branch silently rolls back prod rules" hazard documented
# as a critical rule in MEMORY (feedback_branch_before_firebase_deploy.md). A
# rules change could merge to main, pass tests, and never reach production until
# a human remembered to push it. This workflow closes that gap: tested rules ship
# automatically, from main only.
#
# Trigger: push to main touching any rules/index source (or this workflow).
#
# Auth + IAM: reuses FIREBASE_SERVICE_ACCOUNT_THE_GREEN_HAVEN (same SA as
# deploy-functions.yml). Rules/index deploy needs:
#   - Firebase Rules Admin        (firebaserules.admin)
#   - Cloud Datastore Index Admin (datastore.indexAdmin — firestore.indexes.json)
#   - Firebase Admin              (firebase.admin — covers RTDB + Storage rules release)
# These are a subset of / overlap with the roles already granted for CF deploy.
#
# Safety: the SAME emulator rules tests that gate PRs run again here BEFORE deploy.
# A failing rules test blocks the deploy — no untested rule reaches production.

name: Deploy Rules

on:
  push:
    branches: [main]
    paths:
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'storage.rules'
      - 'config/database.rules.json'
      - '.github/workflows/deploy-rules.yml'
  workflow_dispatch:

# Cancel an in-flight rules deploy if a newer push lands.
concurrency:
  group: deploy-rules-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-rules:
    name: test-then-deploy-rules
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_THE_GREEN_HAVEN }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Verify required secret is configured
        run: |
          if [ -z "$SA_KEY" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT_THE_GREEN_HAVEN secret is not configured."
            echo "Same secret used by deploy-functions.yml. The SA additionally needs:"
            echo "  - Firebase Rules Admin        (firebaserules.admin)"
            echo "  - Cloud Datastore Index Admin (datastore.indexAdmin)"
            echo "  - Firebase Admin              (firebase.admin)"
            exit 1
          fi
          echo "✅ Service-account secret is present"

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      # Rules emulators run on the JVM (firebase-tools requires Java 21+).
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install firebase-tools
        run: npm install -g firebase-tools@15.13.0

      # Gate: re-run the full rules test matrix under emulators BEFORE deploy.
      # Identical commands to firestore-rules.yml — a failure here blocks the deploy.
      - name: Test Firestore rules
        run: firebase emulators:exec --only firestore --project=demo-test 'npm run test:rules'

      - name: Test Storage rules
        run: firebase emulators:exec --only storage,firestore --project=demo-test 'npm run test:storage'

      - name: Test RTDB rules
        run: firebase emulators:exec --only database --project=demo-test 'npm run test:rtdb:rules'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_THE_GREEN_HAVEN }}

      - name: Deploy rules + indexes
        # firebase-tools picks up GOOGLE_APPLICATION_CREDENTIALS from the auth step.
        # Deploys Firestore rules + indexes, Storage rules, and RTDB rules together
        # (all wired in firebase.json). Indexes are additive — Firestore never drops
        # a serving index on deploy, so this is safe to run on every rules change.
        run: |
          firebase deploy \
            --only firestore:rules,firestore:indexes,storage,database \
            --project the-green-haven \
            --force \
            --non-interactive
          echo "✅ Rules + indexes deployed"
