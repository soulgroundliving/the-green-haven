# Auto-deploy Cloud Functions on push to main.
#
# Why this exists: Firebase CF deploy was 100% manual before this workflow.
# Pattern was "merge PR to main, remember to run firebase deploy --only
# functions:<name> from local terminal". Easy to forget. After PR #94 added
# 59 defer attributes (no CF changes), the team got into the habit of NOT
# deploying — which then masked the bug when a real CF change was missed.
# CLAUDE.md §7-NN documents the corollary risk: stale registrations from
# half-finished deploys.
#
# Trigger:
#   - Push to main touching functions/** → deploy that change immediately
#   - Push to main touching shared/gamification-rules.js → predeploy hook
#     syncs it into functions/, so a redeploy is needed
#   - Manual via Actions UI (workflow_dispatch) for forced redeploys
#
# Auth: uses FIREBASE_SERVICE_ACCOUNT_THE_GREEN_HAVEN secret (service-account
# JSON). Required IAM roles on the service account:
#   - Cloud Functions Admin           (cloudfunctions.admin)
#   - Service Account User            (iam.serviceAccountUser — act as runtime SA)
#   - Firebase Authentication Admin   (firebaseauth.admin — setCustomUserClaims)
#   - Firebase Admin                  (firebase.admin — covers billing.viewer + extensions
#                                      + project metadata that Gen 2 deploy reads)
#   - Secret Manager Admin            (secretmanager.admin — Gen 2 CFs with defineSecret
#                                      need secrets.get for metadata, not just accessor)
#   - Cloud Scheduler Admin           (cloudscheduler.admin — scheduled CFs)
#   - Cloud Run Admin                 (run.admin — Gen 2 CFs are Cloud Run services)
#   - Artifact Registry Writer        (artifactregistry.writer — Gen 2 container push)
#   - Service Usage Consumer          (serviceusage.serviceUsageConsumer — enables
#                                      required APIs during deploy)
#
# Required APIs to enable once on the project:
#   gcloud services enable cloudbilling.googleapis.com --project=the-green-haven
#   gcloud services enable cloudfunctions.googleapis.com --project=the-green-haven
#   gcloud services enable run.googleapis.com --project=the-green-haven
#   (others auto-enable during first deploy)
#
# When adding a new role: `gcloud projects add-iam-policy-binding the-green-haven
#   --member="serviceAccount:github-deploy@the-green-haven.iam.gserviceaccount.com"
#   --role="roles/ROLENAME"`
#
# Cost: free on the Actions side. Each deploy uses ~5–10 minutes of compute
# (Firebase CLI smart-diffs unchanged CFs, so steady-state is fast).
#
# Safety: tests run BEFORE deploy. Any failing unit test blocks the entire
# push from deploying — no partial-deploy risk.

name: Deploy Cloud Functions

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'shared/gamification-rules.js'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

# Cancel any in-flight deploy if a newer push lands — no point deploying
# yesterday's code over today's.
concurrency:
  group: deploy-functions-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: deploy-cf
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Expose secret to env so `if:` can check it (secrets are not
      # available directly in step-level `if:` expressions).
      SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_THE_GREEN_HAVEN }}
      # defineString() params from verifyBookingSlip.js + verifySlip.js — these
      # CFs read SLIPOK_API_URL at deploy time. Locally it lives in
      # functions/.env (gitignored). For CI we write it from a GitHub secret.
      SLIPOK_API_URL: ${{ secrets.SLIPOK_API_URL }}
      # Opt actions/checkout@v4 + google-github-actions/auth@v2 into Node.js 24
      # runtime ahead of the forced migration on 2026-06-02.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Verify required secret is configured
        run: |
          if [ -z "$SA_KEY" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT_THE_GREEN_HAVEN secret is not configured."
            echo "Go to: GitHub → repo Settings → Secrets and variables → Actions → New repository secret."
            echo "Name:  FIREBASE_SERVICE_ACCOUNT_THE_GREEN_HAVEN"
            echo "Value: contents of a service-account JSON key file with these IAM roles:"
            echo "         - Cloud Functions Admin     (cloudfunctions.admin)"
            echo "         - Service Account User      (iam.serviceAccountUser)"
            echo "         - Firebase Authentication Admin (firebaseauth.admin)"
            echo "         - Secret Manager Admin      (secretmanager.admin — NOT secretAccessor;"
            echo "                                       Gen 2 deploy needs secrets.get for metadata)"
            echo "         - Cloud Scheduler Admin     (cloudscheduler.admin)"
            echo "         - Cloud Run Admin           (run.admin — Gen 2 CFs)"
            echo "         - Artifact Registry Writer  (artifactregistry.writer — Gen 2 image push)"
            echo ""
            echo "Generate via:"
            echo "  gcloud iam service-accounts keys create key.json \\"
            echo "    --iam-account=<sa-email>"
            exit 1
          fi
          echo "✅ Service-account secret is present"

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install function dependencies
        working-directory: functions
        run: npm ci --no-audit --no-fund

      # Tests run BEFORE deploy. If unit tests fail, NOTHING deploys.
      # npm test in functions/ runs `sync-shared` first (copies gamification
      # rules from shared/), then node --test on __tests__/*.test.js.
      - name: Run Cloud Function unit tests
        working-directory: functions
        run: npm test

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_THE_GREEN_HAVEN }}

      - name: Install firebase-tools
        run: npm install -g firebase-tools@15.13.0

      - name: Write functions/.env from secrets
        # firebase-functions/params defineString() values are read from
        # functions/.env at deploy time. Local devs have this file via
        # `npm run deploy:worktree:prep`; CI has to write it.
        # NOTE: defineSecret() values come from GCP Secret Manager and do
        # NOT need to be written here.
        run: |
          if [ -z "$SLIPOK_API_URL" ]; then
            echo "::error::SLIPOK_API_URL secret is not configured."
            echo "Add as repo secret: GitHub → Settings → Secrets → Actions"
            echo "Name:  SLIPOK_API_URL"
            echo "Value: same as the SLIPOK_API_URL=... line in your local functions/.env"
            exit 1
          fi
          echo "SLIPOK_API_URL=$SLIPOK_API_URL" > functions/.env
          echo "✅ functions/.env written ($(wc -l < functions/.env) line(s))"

      - name: Deploy Cloud Functions
        # google-github-actions/auth writes the SA key path to
        # GOOGLE_APPLICATION_CREDENTIALS — firebase-tools picks it up
        # automatically when no FIREBASE_TOKEN is set.
        #
        # generateBillsOnMeterUpdate is a frozen Gen1 Firestore trigger on SE3
        # (Eventarc does not support asia-southeast3). It CANNOT be updated via
        # CI — any runtime or package.json change causes a fatal deploy error.
        # We exclude it from every CI deploy; it continues running on GCP at its
        # current Node version. See: CLAUDE.md §7-NN + generate_bills_cf_frozen.md
        run: |
          FROZEN="generateBillsOnMeterUpdate"
          CF_LIST=$(grep -oP '^exports\.\K\w+' functions/index.js \
            | grep -v "^${FROZEN}$" \
            | sed 's/^/functions:/' \
            | paste -sd,)
          CF_COUNT=$(echo "${CF_LIST}" | tr ',' '\n' | wc -l)
          echo "Deploying ${CF_COUNT} CFs (${FROZEN} frozen/excluded)"
          firebase deploy \
            --only "${CF_LIST}" \
            --project the-green-haven \
            --force \
            --non-interactive

      - name: Post-deploy smoke check
        # Verify key CF endpoints and Vercel pages respond after deploy.
        # For CFs: a 4xx is fine — CF is running but rejected the empty GET.
        # Fail only on 000 (unreachable) or 5xx (server error).
        # For Vercel: expect 200 on static pages.
        # Retries 3× with 15s gaps for CF cold-start.
        run: |
          CF_BASE="https://asia-southeast1-the-green-haven.cloudfunctions.net"
          VERCEL_BASE="https://the-green-haven.vercel.app"
          ALL_OK=true

          # --- CF endpoints ---
          for CF in liffSignIn verifySlip; do
            for ATTEMPT in 1 2 3; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 -X GET "${CF_BASE}/${CF}")
              if [ "$STATUS" != "000" ] && [ "${STATUS:0:1}" != "5" ]; then
                echo "✅ CF smoke: ${CF} → HTTP ${STATUS} (attempt ${ATTEMPT})"
                break
              fi
              if [ "$ATTEMPT" = "3" ]; then
                echo "::error::CF smoke FAILED: ${CF} returned ${STATUS} after 3 attempts"
                ALL_OK=false
              else
                echo "⏳ ${CF} attempt ${ATTEMPT}: HTTP ${STATUS} — retrying in 15s..."
                sleep 15
              fi
            done
          done

          # --- Vercel pages (no retry needed — CDN is synchronous) ---
          for PAGE in "" "login.html" "api/config"; do
            URL="${VERCEL_BASE}/${PAGE}"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${URL}")
            if [ "${STATUS}" = "200" ] || [ "${STATUS}" = "204" ]; then
              echo "✅ Vercel smoke: /${PAGE} → HTTP ${STATUS}"
            else
              echo "::warning::Vercel smoke: /${PAGE} returned HTTP ${STATUS}"
            fi
          done

          if [ "${ALL_OK}" = "false" ]; then
            exit 1
          fi
