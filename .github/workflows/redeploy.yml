name: Manual Redeploy Trigger

on:
  workflow_dispatch:

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Trigger Vercel Redeploy
        run: |
          # Force push a new commit to trigger Vercel
          git config user.email "github@example.com"
          git config user.name "GitHub Actions"
          echo "# Rebuild timestamp: $(date)" >> REBUILD.txt
          git add REBUILD.txt
          git commit -m "Trigger Vercel rebuild via GitHub Actions" || echo "No changes to commit"
          git push origin main || echo "Push completed"
