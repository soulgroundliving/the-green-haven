name: Manual Redeploy Trigger

on:
  workflow_dispatch:

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Redeploy
        run: |
          if [ -z "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}" ]; then
            echo "ERROR: VERCEL_DEPLOY_HOOK_URL secret is not configured."
            echo "Go to GitHub → Settings → Secrets → Actions and add VERCEL_DEPLOY_HOOK_URL."
            echo "Get the URL from Vercel → Project Settings → Git → Deploy Hooks."
            exit 1
          fi
          response=$(curl -sf -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}")
          echo "Vercel deploy triggered: $response"
