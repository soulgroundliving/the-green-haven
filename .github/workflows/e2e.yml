# Playwright E2E tests — login, bill, slip flows.
#
# Why: frontend has 0% automated test coverage (9-dim audit finding).
# These tests catch regressions in the 3 most critical admin flows by
# running against the live Vercel production URL after every CF deploy.
# Firebase Auth rejects localhost so tests must target the deployed app.
#
# Required secrets (add via GitHub → Settings → Secrets → Actions):
#   SMOKE_ADMIN_EMAIL    — admin test account email
#   SMOKE_ADMIN_PASSWORD — admin test account password
#
# Triggers:
#   - Manual via Actions UI (workflow_dispatch) — run on demand
#   - After every successful CF deploy (workflow_run) — regression catch
#   - Not on every PR — avoids unnecessary Vercel + Firebase load from forks
#
# Graceful degradation: if secrets are not configured the workflow exits
# cleanly with a warning rather than failing — unblocks contributors who
# don't have admin credentials set up locally.

name: E2E Tests

on:
  workflow_dispatch:
  # Run after successful CF deploy to catch regressions introduced by each merge
  workflow_run:
    workflows: ['Deploy Cloud Functions']
    types: [completed]
    branches: [main]
  # Run after every successful Vercel PRODUCTION deploy. This is the path that
  # covers FRONTEND-only pushes (HTML / shared JS), which the workflow_run above
  # does NOT — a frontend change deploys via Vercel but triggers no CF deploy.
  # Closes the gap where §7-SS / §7-QQ / §7-II (all frontend) shipped with no
  # live smoke. Vercel emits a GitHub deployment_status; the job gates on
  # Production + success below so PR "Preview" deploys don't trigger it.
  deployment_status:

# A push fires deployment_status here and (for CF changes) the workflow_run
# above — keep only the latest run per ref instead of piling up duplicates.
concurrency:
  group: e2e-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: playwright-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Gate each trigger:
    #  - workflow_dispatch          → always (manual)
    #  - workflow_run (CF deploy)   → only when that deploy succeeded
    #  - deployment_status (Vercel) → only a successful PRODUCTION deploy
    #    (skip "Preview" deploys from PRs; the specs target the prod URL anyway)
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'deployment_status' && github.event.deployment_status.state == 'success' && github.event.deployment_status.environment == 'Production')

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SMOKE_ADMIN_EMAIL: ${{ secrets.SMOKE_ADMIN_EMAIL }}
      SMOKE_ADMIN_PASSWORD: ${{ secrets.SMOKE_ADMIN_PASSWORD }}

    steps:
      - name: Check secrets
        id: check
        run: |
          if [ -z "$SMOKE_ADMIN_EMAIL" ] || [ -z "$SMOKE_ADMIN_PASSWORD" ]; then
            echo "::warning::SMOKE_ADMIN_EMAIL / SMOKE_ADMIN_PASSWORD secrets not configured."
            echo "::warning::Add them via GitHub → Settings → Secrets and variables → Actions."
            echo "::warning::Skipping E2E tests — no credentials available."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.skip == 'false'

      - uses: actions/setup-node@v6
        if: steps.check.outputs.skip == 'false'
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install root dependencies (includes @playwright/test)
        if: steps.check.outputs.skip == 'false'
        run: npm ci --no-audit --no-fund

      - name: Install Playwright Chromium browser
        if: steps.check.outputs.skip == 'false'
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        if: steps.check.outputs.skip == 'false'
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        uses: actions/upload-artifact@v7
        if: failure() && steps.check.outputs.skip == 'false'
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7
