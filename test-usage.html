<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Usage Tab Test</title>
    <style>
        body { font-family: Arial; margin: 20px; background: #f5f5f5; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        h1 { color: #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #7BA67E; color: white; }
        .success { color: green; font-weight: bold; }
        .test-data { background: #e8f5e9; padding: 10px; margin: 10px 0; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Usage Tab Test</h1>
        <p>This test verifies that the Usage tab functionality is working correctly.</p>

        <div class="test-data">
            <h3>Test Data</h3>
            <p>Adding sample bill data to localStorage for testing...</p>
        </div>

        <div id="results"></div>

        <h2>Usage Table Display</h2>
        <table>
            <thead>
                <tr><th>เดือน</th><th>⚡ ไฟ</th><th>💧 น้ำ</th></tr>
            </thead>
            <tbody id="usageTableBody"></tbody>
        </table>
    </div>

    <script>
        // Add sample bill data to localStorage
        const sampleBills = [
            {
                month: 1, year: 67, dueDate: '2024-02-01', status: 'paid',
                charges: { electric: { usage: 150 }, water: { usage: 25 } },
                rent: 5000, electric: 500, water: 200, trash: 100, total: 5800
            },
            {
                month: 2, year: 67, dueDate: '2024-03-01', status: 'paid',
                charges: { electric: { usage: 160 }, water: { usage: 28 } },
                rent: 5000, electric: 550, water: 220, trash: 100, total: 5870
            },
            {
                month: 3, year: 67, dueDate: '2024-04-01', status: 'pending',
                charges: { electric: { usage: 155 }, water: { usage: 26 } },
                rent: 5000, electric: 520, water: 210, trash: 100, total: 5830
            }
        ];

        // Store the sample data
        localStorage.setItem('bills_2567', JSON.stringify(sampleBills));

        // Test the population logic (same as in tenant-new.html)
        function testUsagePopulation() {
            let bills = [];
            for (let y = 2567; y <= 2570; y++) {
                const billsKey = `bills_${y}`;
                const billsData = localStorage.getItem(billsKey);
                if (billsData) {
                    bills = bills.concat(JSON.parse(billsData));
                }
            }

            // Populate usage table
            const months = ['', 'ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
            const usageRows = bills.sort((a,b) => new Date(b.dueDate) - new Date(a.dueDate)).slice(0, 12).map(b => {
                const year = b.year < 100 ? b.year + 2500 : b.year;
                const electric = b.charges?.electric?.usage || b.electricUsage || '-';
                const water = b.charges?.water?.usage || b.waterUsage || '-';
                return `<tr>
                    <td>${months[b.month]} ${year}</td>
                    <td>${electric}</td>
                    <td>${water}</td>
                </tr>`;
            }).join('');

            document.getElementById('usageTableBody').innerHTML = usageRows || '<tr><td colspan="3" style="text-align:center; color:#888;">ไม่มีข้อมูล</td></tr>';

            // Display results
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `
                <div class="test-data" style="background: #c8e6c9;">
                    <p class="success">✓ Test Passed!</p>
                    <p>Successfully populated Usage table with ${bills.length} bill records.</p>
                    <p><strong>Sample records:</strong></p>
                    <ul>
                        ${bills.map((b, i) => `<li>Record ${i+1}: ${months[b.month]} ${b.year + 2500} - Electric: ${b.charges?.electric?.usage || '-'}, Water: ${b.charges?.water?.usage || '-'}</li>`).join('')}
                    </ul>
                </div>
            `;
        }

        // Run the test
        testUsagePopulation();
    </script>
</body>
</html>
