<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: wss:; script-src 'self' 'unsafe-inline' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: https:; font-src 'self' https:; connect-src 'self' https: wss:;">
  <title>Login - The Green Haven</title>
  <link rel="icon" id="dynamic-favicon" href="/shared/pwa-icon.svg">
  <script>try{const _oi=JSON.parse(localStorage.getItem('owner_info')||'{}');if(_oi.faviconDataUrl)document.getElementById('dynamic-favicon').href=_oi.faviconDataUrl;}catch(_){}</script>
  <link rel="stylesheet" href="shared/brand.css">
  <link rel="stylesheet" href="shared/components.css">
  <!-- Intentionally NOT loading shared/theme-toggle.js — login page is locked to
       light mode via the data-theme="light" attribute on <html>. The script would
       overwrite that with the user's saved gh_theme localStorage preference,
       reintroducing dark mode for users who toggled it on the dashboard. -->
  <script src="shared/modal.js"></script>
  <script src="shared/modal-a11y-bridge.js"></script>
  <script src="shared/security.js"></script>
  <script src="shared/firebase-config-loader.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-brand);
      background: linear-gradient(135deg, var(--brand-primary-dark) 0%, var(--brand-primary) 60%, var(--brand-primary-light) 100%);
      min-height: 100vh;
      display: flex;
      /* column so the card + the legal footer stack vertically (both centered).
         Without this the row-default put the footer beside the card → card
         shifted left of centre. The footer's margin-top:28px assumes column. */
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      max-width: 420px;
      width: 100%;
      overflow: hidden;
    }

    .login-header {
      background: linear-gradient(135deg, var(--brand-primary-dark) 0%, var(--brand-primary) 100%);
      color: white;
      padding: 40px 30px;
      text-align: center;
    }

    .login-header h1 {
      font-size: 28px;
      margin-bottom: 8px;
      font-weight: 700;
      color: #fff;
    }

    .login-header p {
      font-size: 14px;
      color: #fff;
    }

    .login-body {
      padding: 40px 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #1a2332;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 2px solid var(--stone);
      border-radius: 8px;
      font-family: var(--font-brand);
      font-size: 14px;
      transition: all 0.3s;
      background: white;
      /* Pin text colour against brand.css `--ink` which auto-flips white in
         OS dark mode — the form card is hardcoded white, so text must stay
         dark regardless of system theme. Without this, Safari with system
         dark mode renders white-on-white invisible inputs. */
      color: #1a2332;
    }

    .form-group input:hover {
      border-color: #ccc;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--brand-primary);
      box-shadow: 0 0 8px rgba(45, 134, 83, 0.1);
      background: white;
    }

    /* Safari autofill paints text with `-webkit-text-fill-color` (not `color`)
       and an internal yellow background. Override both so autofilled email/
       password match the manually-typed look on the white card. */
    .form-group input:-webkit-autofill,
    .form-group input:-webkit-autofill:hover,
    .form-group input:-webkit-autofill:focus,
    .form-group input:-webkit-autofill:active {
      -webkit-text-fill-color: #1a2332;
      -webkit-box-shadow: 0 0 0 1000px white inset;
      caret-color: #1a2332;
    }

    /* Only show red border AFTER user types something invalid — not on empty placeholder */
    .form-group input:invalid:not(:placeholder-shown):not(:-webkit-autofill) {
      border-color: var(--alert);
    }

    .user-type {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .user-type-btn {
      padding: 12px;
      border: 2px solid var(--stone);
      background: white;
      border-radius: 8px;
      cursor: pointer;
      font-family: var(--font-brand);
      font-weight: 600;
      font-size: 14px;
      color: #6b7a8d;
      transition: all 0.3s;
      flex: 1;
      min-width: 0;
    }

    .user-type-btn:hover {
      background: #f5f5f5;
      border-color: #ccc;
    }

    .user-type-btn.active {
      border-color: var(--brand-primary);
      background: var(--brand-primary-soft);
      color: var(--brand-primary);
      box-shadow: 0 2px 8px rgba(45, 134, 83, 0.15);
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--brand-primary-dark) 0%, var(--brand-primary) 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: var(--font-brand);
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 12px;
      min-height: 44px;
    }

    .login-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(45, 134, 83, 0.3);
    }

    .login-btn:active:not(:disabled) {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(45, 134, 83, 0.2);
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .signup-toggle {
      text-align: center;
      font-size: 14px;
      color: #6b7a8d;
    }

    .signup-toggle a {
      color: var(--brand-primary);
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }

    .error-message {
      display: none;
      background: #ffebee;
      color: var(--alert-text);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      border-left: 4px solid var(--alert);
    }

    .success-message {
      display: none;
      background: var(--brand-primary-soft);
      color: var(--brand-primary);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      border-left: 4px solid var(--brand-primary);
    }

    .loading {
      display: none;
      text-align: center;
      padding: 20px;
    }

    .spinner {
      border: 4px solid var(--stone);
      border-top: 4px solid var(--brand-primary);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .form-mode {
      display: none;
    }

    .form-mode.active {
      display: block;
    }

    .forgot-password {
      text-align: right;
      margin-bottom: 20px;
    }

    .forgot-password a {
      color: var(--brand-primary);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    /* Password Toggle Styles */
    .password-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .password-wrapper input {
      flex: 1;
      padding-right: 40px;
    }

    .password-toggle {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: #6b7a8d;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      border-radius: 4px;
    }

    .password-toggle:hover {
      color: var(--brand-primary);
      background: rgba(45, 134, 83, 0.08);
    }

    .password-toggle:active {
      background: rgba(45, 134, 83, 0.15);
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      body {
        padding: 15px;
      }

      .login-container {
        max-width: 100%;
        border-radius: 12px;
      }

      .login-header {
        padding: 30px 20px;
      }

      .login-header h1 {
        font-size: 24px;
      }

      .login-header p {
        font-size: 13px;
      }

      .login-body {
        padding: 25px 20px;
      }

      .user-type {
        gap: 10px;
        margin-bottom: 15px;
      }

      .user-type-btn {
        padding: 10px;
        font-size: 13px;
      }

      .form-group {
        margin-bottom: 18px;
      }

      .form-group label {
        font-size: 13px;
        margin-bottom: 6px;
      }

      .form-group input {
        padding: 11px;
        font-size: 14px;
      }

      .submit-btn {
        padding: 12px;
        font-size: 15px;
        margin-bottom: 16px;
      }

      .signup-toggle {
        font-size: 13px;
      }

      .password-strength {
        font-size: 11px;
      }

      .error-message, .success-message {
        font-size: 13px;
        padding: 10px;
        margin-bottom: 15px;
      }

      .loading {
        font-size: 13px;
      }

      .password-toggle {
        font-size: 16px;
        padding: 6px 8px;
        right: 10px;
      }

      .password-wrapper input {
        padding-right: 36px;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
      }

      .login-container {
        border-radius: 10px;
        max-width: 100%;
      }

      .login-header {
        padding: 25px 15px;
      }

      .login-header h1 {
        font-size: 20px;
        margin-bottom: 6px;
      }

      .login-header p {
        font-size: 12px;
      }

      .login-body {
        padding: 20px 15px;
      }

      .user-type {
        flex-direction: column;
        gap: 8px;
        margin-bottom: 12px;
      }

      .user-type-btn {
        padding: 8px;
        font-size: 12px;
        width: 100%;
      }

      .form-group {
        margin-bottom: 15px;
      }

      .form-group label {
        font-size: 12px;
        margin-bottom: 5px;
      }

      .form-group input {
        padding: 10px;
        font-size: 13px;
        border-radius: 6px;
      }

      .password-wrapper {
        border-radius: 6px;
      }

      .submit-btn {
        padding: 11px;
        font-size: 14px;
        border-radius: 6px;
        margin-bottom: 14px;
      }

      .signup-toggle {
        font-size: 12px;
        margin-top: 15px;
      }

      .signup-toggle a {
        font-weight: 600;
      }

      .forgot-link {
        font-size: 12px;
      }

      .error-message, .success-message {
        font-size: 12px;
        padding: 8px;
        margin-bottom: 12px;
        border-radius: 6px;
      }

      .loading {
        font-size: 12px;
      }

      .password-toggle {
        font-size: 15px;
        padding: 5px 6px;
        right: 8px;
      }

      .password-wrapper input {
        padding-right: 34px;
        font-size: 13px;
      }

      .password-strength {
        font-size: 10px;
        margin-top: 5px;
        padding: 6px;
      }

      #req-length, #req-upper, #req-lower, #req-number {
        font-size: 10px;
        padding: 3px;
      }

      .register-grid {
        grid-template-columns: 1fr;
      }

      .form-group:has(label:contains("ชื่อ")) {
        margin-bottom: 12px;
      }
    }

    @media (max-width: 360px) {
      .login-container {
        border-radius: 8px;
      }

      .login-header {
        padding: 20px 12px;
      }

      .login-header h1 {
        font-size: 18px;
      }

      .login-body {
        padding: 18px 12px;
      }

      .form-group input {
        font-size: 12px;
      }

      .submit-btn {
        font-size: 13px;
        padding: 10px;
      }

      .user-type-btn {
        font-size: 11px;
        padding: 7px;
      }
    }

    /* Tablet & Desktop - Landscape */
    @media (max-width: 768px) and (orientation: landscape) {
      .login-header {
        padding: 25px 20px;
      }

      .login-header h1 {
        font-size: 22px;
        margin-bottom: 6px;
      }

      .login-body {
        padding: 20px;
      }

      .form-group {
        margin-bottom: 14px;
      }
    }

    /* Large Desktop */
    @media (min-width: 1024px) {
      .login-container {
        max-width: 450px;
      }

      .login-header {
        padding: 50px 35px;
      }

      .login-header h1 {
        font-size: 32px;
      }

      .login-body {
        padding: 45px 35px;
      }
    }

    /* Phase 4E Step 2 classes (replace inline style="") */
    .hidden { display: none; }
    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .form-group-flush { margin-bottom: 0; }
    .password-strength-box { font-size: 12px; margin-top: 6px; padding: 8px; background: #f5f5f5; border-radius: 4px; }
    .password-req-grid { margin-top: 6px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
    .password-req-pill { font-size: 11px; padding: 4px; background: #ddd; border-radius: 2px; text-align: center; }
    .loading-text { margin-top: 12px; color: #6b7a8d; }
    /* reset-password modal classes (§ style-src-attr migration) */
    .reset-hint{margin:0 0 12px;font-size:14px;color:var(--muted);}
    .reset-email-input{width:100%;padding:10px 12px;border:1.5px solid var(--stone);border-radius:8px;font-size:14px;box-sizing:border-box;font-family:inherit;background:#fff;color:#1a2332;}
    .reset-err{display:none;margin-top:8px;color:var(--alert);font-size:13px;}
  </style>
</head>
<body>
<a class="skip-link" href="#main-content">ข้ามไปยังเนื้อหาหลัก</a>
  <div class="login-container">
    <div class="login-header">
      <h1><span aria-hidden="true">🏢</span> The Green Haven</h1>
      <p>ระบบจัดการอพาร์ทเมนต์</p>
    </div>

    <div class="login-body" id="main-content">
      <!-- User Type Selection -->
      <div class="user-type" role="radiogroup" aria-label="ประเภทผู้ใช้งาน">
        <button class="user-type-btn active" role="radio" aria-checked="true"  data-action="user-type" data-type="admin"><span aria-hidden="true">👨‍💼</span> Admin</button>
        <button class="user-type-btn"        role="radio" aria-checked="false" data-action="user-type" data-type="accountant"><span aria-hidden="true">📊</span> บัญชี</button>
        <button class="user-type-btn"        role="radio" aria-checked="false" data-action="user-type" data-type="tenant"><span aria-hidden="true">👤</span> Tenant</button>
      </div>

      <div id="errorMessage"   class="error-message"   role="alert"  aria-live="assertive"></div>
      <div id="successMessage" class="success-message" role="status" aria-live="polite"></div>

      <!-- Login Form -->
      <form id="loginForm" class="form-mode active" data-action="login-submit" aria-describedby="errorMessage">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" required placeholder="your@email.com" autocomplete="email" inputmode="email">
        </div>

        <div class="form-group">
          <label for="loginPassword">Password</label>
          <div class="password-wrapper">
            <input type="password" id="loginPassword" required placeholder="••••••••" autocomplete="current-password">
            <button type="button" class="password-toggle" data-action="toggle-password" data-target="loginPassword" aria-label="แสดง/ซ่อนรหัสผ่าน" aria-pressed="false"><span aria-hidden="true">👁️</span></button>
          </div>
        </div>

        <div class="forgot-password">
          <a data-action="forgot-password">ลืมรหัสผ่าน?</a>
        </div>

        <button type="submit" class="login-btn" id="loginBtn">เข้าสู่ระบบ</button>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="form-mode" data-action="register-submit" aria-describedby="errorMessage">
        <div class="form-row-2">
          <div class="form-group form-group-flush">
            <label for="registerFirstName">ชื่อ</label>
            <input type="text" id="registerFirstName" required placeholder="ชื่อ" autocomplete="given-name">
          </div>
          <div class="form-group form-group-flush">
            <label for="registerLastName">นามสกุล</label>
            <input type="text" id="registerLastName" required placeholder="นามสกุล" autocomplete="family-name">
          </div>
        </div>

        <div class="form-group">
          <label for="registerEmail">Email</label>
          <input type="email" id="registerEmail" required placeholder="your@email.com" autocomplete="email" inputmode="email">
        </div>

        <div class="form-group">
          <label for="registerPassword">Password</label>
          <div class="password-wrapper">
            <input type="password" id="registerPassword" required placeholder="••••••••" minlength="6" autocomplete="new-password" data-action="password-strength" aria-describedby="passwordStrength">
            <button type="button" class="password-toggle" data-action="toggle-password" data-target="registerPassword" aria-label="แสดง/ซ่อนรหัสผ่าน" aria-pressed="false">👁️</button>
          </div>
          <div id="passwordStrength" class="password-strength-box hidden" aria-live="polite">
            <div id="strengthFeedback">ตรวจสอบความแข็งแรง...</div>
            <div class="password-req-grid">
              <div id="req-length" class="password-req-pill">8+ ตัว</div>
              <div id="req-upper" class="password-req-pill">A-Z</div>
              <div id="req-lower" class="password-req-pill">a-z</div>
              <div id="req-number" class="password-req-pill">0-9</div>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="registerPasswordConfirm">ยืนยัน Password</label>
          <div class="password-wrapper">
            <input type="password" id="registerPasswordConfirm" required placeholder="••••••••" autocomplete="new-password">
            <button type="button" class="password-toggle" data-action="toggle-password" data-target="registerPasswordConfirm" aria-label="แสดง/ซ่อนรหัสผ่าน" aria-pressed="false">👁️</button>
          </div>
        </div>

        <div id="tenantFields" class="hidden">
          <div class="form-group">
            <label for="roomNumber">หมายเลขห้อง</label>
            <input type="text" id="roomNumber" placeholder="เช่น 15, 101" autocomplete="off" inputmode="numeric">
          </div>
        </div>

        <button type="submit" class="login-btn" id="registerBtn">สมัครสมาชิก</button>
      </form>

      <div class="loading" id="loading" role="status" aria-live="polite">
        <div class="spinner" aria-hidden="true"></div>
        <p class="loading-text">กำลังประมวลผล...</p>
      </div>

      <!-- Form Toggle -->
      <div class="signup-toggle" id="formToggle">
        ยังไม่มีบัญชี? <a data-action="toggle-form">สมัครสมาชิก</a>
      </div>
    </div>
  </div>

  <!-- Firebase Auth -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
    import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
    // Phase 4D App Check disabled 2026-04-25 — see next_session_handoff.md
    // import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app-check.js";

    // Firebase configuration - loaded from /api/config endpoint
    // This keeps the API key secure while serving it to the client
    let firebaseConfig;
    let app;
    let auth;
    let database;
    let db;

    // Initialize Firebase once config is loaded
    async function initializeFirebase() {
      try {
        firebaseConfig = await window.loadFirebaseConfig();
        app = initializeApp(firebaseConfig);
        // initializeAppCheck(app, { provider: new ReCaptchaV3Provider('6LeJX8gsAAAAAN7mD2p2uutB31ryWXYXNA1ndZwA'), isTokenAutoRefreshEnabled: true });
        auth = getAuth(app);
        database = getDatabase(app);
        db = getFirestore(app);

        window.auth = auth;
        window.database = database;
        window.firebaseDB = { ref, set, get };
        // Expose Firestore + helpers so the classic-script handleLogin block
        // (which writes audit_events on failure) can reach them. Without this,
        // `db` / `addDoc` / `collection` / `serverTimestamp` are module-scoped
        // and the catch block crashes with ReferenceError instead of logging
        // the failed attempt — observed 2026-04-28.
        window.db = db;
        window.addDoc = addDoc;
        window.collection = collection;
        window.serverTimestamp = serverTimestamp;

        // Mark Firebase as ready
        window.firebaseReady = true;
        console.log('✅ Firebase initialized successfully');
      } catch (error) {
        console.error('❌ Failed to initialize Firebase:', error);
        document.getElementById('errorMessage').textContent = 'Error initializing Firebase. Please check console.';
        throw error;
      }
    }

    // Initialize Firebase immediately
    initializeFirebase();

    // Import signOut function
    import { signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

    // Export Firebase Auth functions to global scope
    window.firebaseAuthFunctions = {
      createUserWithEmailAndPassword: (email, password) => createUserWithEmailAndPassword(auth, email, password),
      signInWithEmailAndPassword: (email, password) => signInWithEmailAndPassword(auth, email, password),
      sendPasswordResetEmail: (email) => sendPasswordResetEmail(auth, email),
      signOut: () => signOut(auth)
    };

    console.log('✅ Firebase Auth initialized');
  </script>

  <!-- Authentication Logic -->
  <script>
    let currentUserType = 'admin';
    let isLoginMode = true;

    function selectUserType(type, button) {
      currentUserType = type;
      document.querySelectorAll('.user-type-btn').forEach(btn => {
        btn.classList.remove('active');
        btn.setAttribute('aria-checked', 'false');
      });
      button.classList.add('active');
      button.setAttribute('aria-checked', 'true');

      // ✅ Clear form fields and errors when switching role
      if (isLoginMode) {
        document.getElementById('loginEmail').value = '';
        document.getElementById('loginPassword').value = '';
      } else {
        document.getElementById('registerFirstName').value = '';
        document.getElementById('registerLastName').value = '';
        document.getElementById('registerEmail').value = '';
        document.getElementById('registerPassword').value = '';
        document.getElementById('registerPasswordConfirm').value = '';
        document.getElementById('roomNumber').value = '';
      }

      // ✅ Clear error messages
      const messageDiv = document.getElementById('message');
      if (messageDiv) {
        messageDiv.textContent = '';
        messageDiv.style.display = 'none';
      }

      const tenantFields = document.getElementById('tenantFields');
      tenantFields.classList.toggle('hidden', type !== 'tenant');
    }

    function togglePassword(fieldId, button) {
      const field = document.getElementById(fieldId);
      const isPassword = field.type === 'password';
      field.type = isPassword ? 'text' : 'password';
      // Show icon for next action: if field is password (hidden), show 👁️ to open; if text (visible), show 🙈 to close
      button.textContent = field.type === 'password' ? '👁️' : '🙈';
      button.setAttribute('aria-pressed', field.type === 'password' ? 'false' : 'true');
    }

    function toggleForm() {
      isLoginMode = !isLoginMode;
      document.getElementById('loginForm').classList.toggle('active');
      document.getElementById('registerForm').classList.toggle('active');

      const toggle = document.getElementById('formToggle');
      if (isLoginMode) {
        toggle.innerHTML = 'ยังไม่มีบัญชี? <a data-action="toggle-form">สมัครสมาชิก</a>';
      } else {
        toggle.innerHTML = 'มีบัญชีอยู่แล้ว? <a data-action="toggle-form">เข้าสู่ระบบ</a>';
      }

      clearMessages();
    }

    function showMessage(message, isError = true) {
      const errorEl = document.getElementById('errorMessage');
      const successEl = document.getElementById('successMessage');

      if (isError) {
        errorEl.textContent = message;
        errorEl.style.display = 'block';
        successEl.style.display = 'none';
      } else {
        successEl.textContent = message;
        successEl.style.display = 'block';
        errorEl.style.display = 'none';
      }
    }

    function clearMessages() {
      document.getElementById('errorMessage').style.display = 'none';
      document.getElementById('successMessage').style.display = 'none';
    }

    function setLoading(show) {
      document.getElementById('loading').style.display = show ? 'block' : 'none';
      document.getElementById('loginBtn').disabled = show;
      document.getElementById('registerBtn').disabled = show;
    }

    // ===== RATE LIMITING FOR LOGIN ATTACKS =====
    /**
     * Rate Limiter to prevent brute force attacks
     * Tracks failed login attempts per email address
     * Locks account after 5 failed attempts for 15 minutes
     */
    const RateLimiter = {
      maxAttempts: 5,
      lockoutDuration: 15 * 60 * 1000, // 15 minutes
      storage: 'auth_rate_limit',

      /**
       * Get attempts data for an email
       */
      getAttempts(email) {
        const data = JSON.parse(sessionStorage.getItem(this.storage) || '{}');
        return data[email] || { count: 0, lockedUntil: 0 };
      },

      /**
       * Record a failed login attempt
       */
      recordFailure(email) {
        const data = JSON.parse(sessionStorage.getItem(this.storage) || '{}');
        const attempts = data[email] || { count: 0, lockedUntil: 0 };
        attempts.count += 1;
        attempts.lastAttempt = Date.now();

        // Lock account after max attempts
        if (attempts.count >= this.maxAttempts) {
          attempts.lockedUntil = Date.now() + this.lockoutDuration;
          console.warn(`⚠️ Too many login attempts for ${email}. Locked until ${new Date(attempts.lockedUntil).toLocaleString()}`);
        }

        data[email] = attempts;
        sessionStorage.setItem(this.storage, JSON.stringify(data));
      },

      /**
       * Reset attempts on successful login
       */
      resetAttempts(email) {
        const data = JSON.parse(sessionStorage.getItem(this.storage) || '{}');
        delete data[email];
        sessionStorage.setItem(this.storage, JSON.stringify(data));
      },

      /**
       * Check if account is locked
       */
      isLocked(email) {
        const attempts = this.getAttempts(email);
        if (attempts.lockedUntil > Date.now()) {
          const minutesLeft = Math.ceil((attempts.lockedUntil - Date.now()) / 60000);
          return {
            locked: true,
            minutesLeft: minutesLeft,
            message: `❌ บัญชีนี้ถูกล็อคไว้ ${minutesLeft} นาที เนื่องจากพยายามเข้าสู่ระบบล้มเหลวหลายครั้ง`
          };
        }
        return { locked: false };
      },

      /**
       * Get remaining attempts for display
       */
      getRemainingAttempts(email) {
        const attempts = this.getAttempts(email);
        return Math.max(0, this.maxAttempts - attempts.count);
      }
    };

    // ✅ Helper to ensure firebaseAuthFunctions is available
    async function ensureFirebaseReady() {
      let retries = 0;
      while (!window.firebaseAuthFunctions && retries < 10) {
        console.warn('Waiting for Firebase to initialize...', retries);
        await new Promise(resolve => setTimeout(resolve, 100));
        retries++;
      }
      if (!window.firebaseAuthFunctions) {
        throw new Error('Firebase initialization failed');
      }
    }

    // ✅ Safe signOut wrapper
    async function safeSignOut() {
      try {
        await ensureFirebaseReady();
        if (window.firebaseAuthFunctions && window.firebaseAuthFunctions.signOut) {
          await window.firebaseAuthFunctions.signOut();
        }
      } catch (error) {
        console.error('Sign out error:', error);
      }
    }

    async function handleLogin(event) {
      event.preventDefault();
      clearMessages();

      // Wait for Firebase to be initialized
      if (!window.firebaseReady) {
        showMessage('กำลังโหลด... โปรดรอสักครู่');
        setLoading(false);
        return;
      }

      const email = document.getElementById('loginEmail').value.trim();

      // ===== RATE LIMITING CHECK =====
      const lockStatus = RateLimiter.isLocked(email);
      if (lockStatus.locked) {
        showMessage(lockStatus.message);
        return;
      }

      setLoading(true);

      try {
        const password = document.getElementById('loginPassword').value;

        // Validate email format
        if (!window.SecurityUtils.isValidEmail(email)) {
          showMessage('อีเมลไม่ถูกต้อง');
          setLoading(false);
          return;
        }

        // ===== SESSION HYGIENE BEFORE SIGN-IN =====
        // 1. Sign out any stale Firebase Auth session (e.g. cached adminavatar99
        //    from earlier testing). Without this, a wrong password retry leaves
        //    the OLD session active — dashboard then loads the wrong user.
        // 2. Wipe sessionStorage so no stale {userType, roomNumber, expiresAt}
        //    survives if signIn fails later in this function.
        try { await window.firebaseAuthFunctions.signOut(); } catch(_) {}
        sessionStorage.removeItem('user');
        sessionStorage.removeItem('_adminPreview');

        const userCredential = await window.firebaseAuthFunctions.signInWithEmailAndPassword(email, password);
        const user = userCredential.user;
        if (!user || user.email?.toLowerCase() !== email.toLowerCase()) {
          // Defensive: signIn returned a user object that doesn't match the
          // requested email. Should never happen, but if it does we'd otherwise
          // silently log them in as somebody else.
          await safeSignOut();
          throw new Error('Sign-in returned mismatched user — please try again');
        }

        // Get user data from database with timeout
        let userData = null;
        try {
          const userRef = window.firebaseDB.ref(window.database, `users/${user.uid}`);

          // Create a timeout promise (2 seconds max - fallback faster)
          const timeoutPromise = new Promise((_, reject) =>
            setTimeout(() => reject(new Error('Database timeout')), 2000)
          );

          const snapshot = await Promise.race([
            window.firebaseDB.get(userRef),
            timeoutPromise
          ]);
          userData = snapshot.val();

        } catch (dbError) {
          // Database timeout - use fallback but keep userData as null for now
          console.warn('Database timeout, will use fallback:', dbError.message);
          userData = null;
        }

        // ✅ If no database data, create minimal fallback
        if (!userData) {
          const params = new URLSearchParams(window.location.search);
          const urlRoomNumber = params.get('room');

          // For tenant accounts, try to extract room number from email (e.g., "tenant15@test.com" → 15)
          let extractedRoom = null;
          if (currentUserType === 'tenant') {
            const emailMatch = email.match(/tenant(\d+)@/);
            if (emailMatch) {
              extractedRoom = emailMatch[1];
              console.log(`✅ Extracted room number ${extractedRoom} from email: ${email}`);
            }
          }

          userData = {
            uid: user.uid,
            email: user.email,
            name: user.email.split('@')[0],
            userType: currentUserType,  // Use what user selected on login
            roomNumber: urlRoomNumber || extractedRoom || null,  // Try URL param first, then extract from email, then fallback to null
            isFromFallback: true  // Mark as fallback for tracking
          };
          console.warn('⚠️ Using fallback userData due to database unavailability', { roomNumber: userData.roomNumber, userType: currentUserType });
        }

        // ✅ SECURITY: Verify user type matches what they selected.
        //   - Admin bypass: an admin account can sign in via ANY tab and act
        //     as that role (e.g. log in via Tenant tab to drive tenant_app for
        //     QA). The actual capability is still gated by Firebase rules +
        //     custom claims, so admin posing as tenant gets full access via
        //     admin claim regardless of which tab they used.
        //   - Fallback userData: trust the selection since we can't read DB.
        const _adminActingAsOther = userData.userType === 'admin' && userData.userType !== currentUserType;
        if (!userData.isFromFallback && userData.userType !== currentUserType && !_adminActingAsOther) {
          await safeSignOut();
          const typeLabel = currentUserType === 'admin' ? 'Admin' : currentUserType === 'accountant' ? 'Accountant (บัญชี)' : 'Tenant';
          throw new Error(`❌ บัญชีนี้ไม่ใช่ ${typeLabel} (สมัครไว้เป็น ${userData.userType})`);
        }

        // ===== SUCCESS: RESET RATE LIMITER =====
        RateLimiter.resetAttempts(email);

        // Save session
        const sessionData = {
          uid: user.uid,
          email: user.email,
          name: userData.name,
          userType: userData.userType,
          roomNumber: userData.roomNumber || null
        };
        console.log('💾 Saving to sessionStorage:', sessionData);
        sessionStorage.setItem('user', JSON.stringify(sessionData));

        showMessage(`เข้าสู่ระบบสำเร็จ! (${userData.name})`, false);

        // Save secure session with timeout
        window.SecurityUtils.saveSecureSession(userData);

        // Redirect based on user type
        setTimeout(() => {
          console.log('🔍 DEBUG: Redirect Logic', {
            userType: userData.userType,
            roomNumber: userData.roomNumber,
            isFromFallback: userData.isFromFallback,
            email: userData.email
          });

          // When admin signs in via a non-admin tab, redirect based on the
          // tab they picked (currentUserType) so they land on the role they
          // wanted to QA. Admin claim still rides along, so Firebase rules
          // remain happy on the destination page.
          const effectiveRole = _adminActingAsOther ? currentUserType : userData.userType;
          if (effectiveRole === 'accountant') {
            console.log('➡️ Redirecting to: /tax-filing#dashboard');
            window.location.href = '/tax-filing#dashboard';
          } else if (effectiveRole === 'admin') {
            console.log('➡️ Redirecting to: /dashboard');
            window.location.href = '/dashboard';
          } else if (effectiveRole === 'tenant' && _adminActingAsOther) {
            // Admin acting as tenant → default admin-preview view of room 15
            // (the canonical test room). They can switch room via the admin
            // preview bar inside tenant_app.
            console.log('➡️ Redirecting to: /tenant_app?room=15&building=rooms (admin preview)');
            window.location.href = '/tenant_app?room=15&building=rooms';
          } else if (effectiveRole === 'tenant') {
            // Redirect to /tenant_app WITHOUT ?room= URL params. The room/building
            // already sit in sessionStorage.user (set above as {roomNumber, ...})
            // and tenant_app's detectRoomBuilding() reads from there. Including
            // the params in the URL would trigger the admin-preview path which
            // sets _adminPreview=1 — only admins should hit that codepath, not
            // real tenant logins.
            console.log('➡️ Redirecting to: /tenant_app (room from sessionStorage)');
            window.location.href = '/tenant_app';
          } else {
            console.warn('⚠️ Unknown userType, defaulting to dashboard:', userData.userType);
            window.location.href = '/dashboard';
          }
        }, 1500);

      } catch (error) {
        console.error('Login error:', error);

        // ===== FAILURE: RECORD RATE LIMIT ATTEMPT =====
        RateLimiter.recordFailure(email);
        const remaining = RateLimiter.getRemainingAttempts(email);

        // ===== AUDIT: write failed attempt to Firestore auth_events =====
        if (db) {
          const atIdx = email.indexOf('@');
          const maskedEmail = atIdx > 2
            ? email.slice(0, 2) + '***' + email.slice(atIdx)
            : '***' + (atIdx >= 0 ? email.slice(atIdx) : '');
          addDoc(collection(db, 'auth_events'), {
            maskedEmail,
            ua: navigator.userAgent.slice(0, 200),
            errorCode: error.code || 'unknown',
            ts: serverTimestamp(),
          }).catch(() => {}); // fire-and-forget
        }

        let errorMessage = error.message || 'เข้าสู่ระบบไม่สำเร็จ';
        if (remaining > 0) {
          errorMessage += ` (เหลือความพยายาม ${remaining} ครั้ง)`;
        }

        showMessage(errorMessage);
        setLoading(false);
      }
    }

    function updatePasswordStrength() {
      const password = document.getElementById('registerPassword').value;
      const strengthEl = document.getElementById('passwordStrength');
      const feedbackEl = document.getElementById('strengthFeedback');

      if (!password) {
        strengthEl.classList.add('hidden');
        return;
      }

      strengthEl.classList.remove('hidden');
      const strength = window.SecurityUtils.validatePasswordStrength(password);

      feedbackEl.textContent = strength.feedback;

      // Update requirement indicators
      document.getElementById('req-length').style.background = strength.requirements.length ? '#4caf50' : '#ddd';
      document.getElementById('req-upper').style.background = strength.requirements.uppercase ? '#4caf50' : '#ddd';
      document.getElementById('req-lower').style.background = strength.requirements.lowercase ? '#4caf50' : '#ddd';
      document.getElementById('req-number').style.background = strength.requirements.number ? '#4caf50' : '#ddd';
    }

    async function handleRegister(event) {
      event.preventDefault();
      clearMessages();

      const firstName = document.getElementById('registerFirstName').value.trim();
      const lastName = document.getElementById('registerLastName').value.trim();
      const name = firstName && lastName ? `${firstName} ${lastName}` : (firstName || lastName || '');
      const email = document.getElementById('registerEmail').value.trim();
      const password = document.getElementById('registerPassword').value;
      const passwordConfirm = document.getElementById('registerPasswordConfirm').value;

      // ===== RATE LIMITING CHECK FOR REGISTRATION =====
      const lockStatus = RateLimiter.isLocked(email);
      if (lockStatus.locked) {
        showMessage(lockStatus.message);
        return;
      }

      // Validate inputs
      if (!window.SecurityUtils.isValidEmail(email)) {
        showMessage('อีเมลไม่ถูกต้อง');
        return;
      }

      // Validate name (first name is required)
      if (!firstName || firstName.length < 2 || firstName.length > 100) {
        showMessage('ชื่อต้องมีความยาว 2-100 ตัวอักษร');
        return;
      }

      const strength = window.SecurityUtils.validatePasswordStrength(password);
      if (!strength.isValid) {
        showMessage(strength.feedback);
        return;
      }

      if (password !== passwordConfirm) {
        showMessage('รหัสผ่านไม่ตรงกัน');
        return;
      }

      // Sanitize name inputs
      const sanitizedFirstName = window.SecurityUtils.sanitizeInput(firstName);
      const sanitizedLastName = window.SecurityUtils.sanitizeInput(lastName);
      const sanitizedName = sanitizedFirstName && sanitizedLastName ? `${sanitizedFirstName} ${sanitizedLastName}` : (sanitizedFirstName || sanitizedLastName || '');

      setLoading(true);

      try {
        // Create auth user
        const userCredential = await window.firebaseAuthFunctions.createUserWithEmailAndPassword(email, password);
        const user = userCredential.user;

        // Save user data
        const userData = {
          uid: user.uid,
          email: email,
          firstName: sanitizedFirstName,
          lastName: sanitizedLastName,
          name: sanitizedName,
          userType: currentUserType,
          createdAt: new Date().toISOString(),
          timestamp: Date.now(),
          expiresAt: Date.now() + (24 * 60 * 60 * 1000) // 24 hours
        };

        if (currentUserType === 'tenant') {
          const sanitizedRoom = window.SecurityUtils.sanitizeInput(
            document.getElementById('roomNumber').value.trim()
          );
          if (!sanitizedRoom || sanitizedRoom.length > 10) {
            throw new Error('หมายเลขห้องต้องมีความยาว 1-10 ตัวอักษร');
          }
          userData.roomNumber = sanitizedRoom;
        }

        const userRef = window.firebaseDB.ref(window.database, `users/${user.uid}`);
        try {
          await window.firebaseDB.set(userRef, userData);
        } catch (dbError) {
          // If save fails, delete the auth account to maintain consistency
          await user.delete();
          throw new Error('ไม่สามารถบันทึกข้อมูลผู้ใช้ได้ กรุณาลองใหม่');
        }

        // ===== SUCCESS: RESET RATE LIMITER FOR REGISTRATION =====
        RateLimiter.resetAttempts(email);

        showMessage('✅ สมัครสมาชิกสำเร็จ! ยินดีต้อนรับ ' + sanitizedName, false);

        // Save secure session with timeout
        window.SecurityUtils.saveSecureSession(userData);

        // Redirect based on user type (use userData.userType instead of currentUserType)
        setTimeout(() => {
          if (userData.userType === 'accountant') {
            window.location.href = '/tax-filing#dashboard';
          } else if (userData.userType === 'admin') {
            window.location.href = '/dashboard';
          } else if (userData.userType === 'tenant') {
            window.location.href = `/tenant?room=${userData.roomNumber}`;
          } else {
            window.location.href = '/dashboard';
          }
        }, 1500);

      } catch (error) {
        console.error('Register error:', error);

        // ===== FAILURE: RECORD RATE LIMIT ATTEMPT FOR REGISTRATION =====
        RateLimiter.recordFailure(email);

        let errorMsg = error.message;
        if (error.code === 'auth/email-already-in-use') {
          errorMsg = 'อีเมลนี้ลงทะเบียนไปแล้ว';
        } else if (error.code === 'auth/weak-password') {
          errorMsg = 'รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร';
        }
        showMessage(errorMsg);
        setLoading(false);
      }
    }

    function showForgotPassword() {
      window.GhModal.open({
        title: 'รีเซ็ตรหัสผ่าน',
        body: '<p class="reset-hint">กรอกอีเมลที่ใช้ลงทะเบียน ระบบจะส่งลิงก์รีเซ็ตให้ทันที</p>' +
          '<input type="email" id="gh-reset-email" placeholder="email@example.com" autocomplete="email" inputmode="email" ' +
          'class="reset-email-input">' +
          '<div id="gh-reset-err" role="alert" class="reset-err"></div>',
        actions: [
          { label: 'ยกเลิก', variant: 'ghost', onClick: function(m) { m.close(); } },
          { label: 'ส่งลิงก์รีเซ็ต', variant: 'primary', onClick: async function(m) {
            const emailEl = document.getElementById('gh-reset-email');
            const errEl  = document.getElementById('gh-reset-err');
            const email  = (emailEl?.value || '').trim();
            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
              errEl.textContent = 'กรุณากรอกอีเมลให้ถูกต้อง';
              errEl.style.display = 'block';
              emailEl?.focus();
              return;
            }
            try {
              await window.firebaseAuthFunctions.sendPasswordResetEmail(email);
              m.close();
              showMessage('ส่งลิงก์รีเซ็ตรหัสผ่านไปยังอีเมลของคุณแล้ว', false);
            } catch (err) {
              errEl.textContent = err.message || 'เกิดข้อผิดพลาด กรุณาลองใหม่';
              errEl.style.display = 'block';
            }
          }}
        ]
      });
      setTimeout(function() { document.getElementById('gh-reset-email')?.focus(); }, 80);
    }

    console.log('✅ Authentication logic loaded');

    // Phase 4E Step 2: event-delegation dispatcher (replaces 13 inline onclick/onsubmit/oninput handlers).
    // One listener per event type; the dispatcher routes by data-action attribute.
    document.addEventListener('click', (e) => {
      const el = e.target.closest('[data-action]');
      if (!el) return;
      // Skip form elements — they're routed by submit/input handlers below.
      if (el.tagName === 'FORM' || el.tagName === 'INPUT') return;
      const action = el.getAttribute('data-action');
      if (action === 'user-type') selectUserType(el.getAttribute('data-type'), el);
      else if (action === 'toggle-password') togglePassword(el.getAttribute('data-target'), el);
      else if (action === 'forgot-password') showForgotPassword();
      else if (action === 'toggle-form') toggleForm();
    });
    document.addEventListener('submit', (e) => {
      const action = e.target.getAttribute && e.target.getAttribute('data-action');
      if (action === 'login-submit') handleLogin(e);
      else if (action === 'register-submit') handleRegister(e);
    });
    document.addEventListener('input', (e) => {
      if (e.target.getAttribute && e.target.getAttribute('data-action') === 'password-strength') {
        updatePasswordStrength();
      }
    });
  </script>
