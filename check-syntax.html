<!DOCTYPE html>
<html>
<head>
    <title>Phase 5 File Syntax Check</title>
</head>
<body>
    <h1>Checking Phase 5 Files...</h1>
    <ul id="results"></ul>
    
    <script>
        // Check if accounting.html exists and loads
        fetch('accounting.html')
            .then(r => r.text())
            .then(html => {
                const hasSecurityJS = html.includes('security.js');
                const hasAuditJS = html.includes('audit.js');
                const hasChart = html.includes('chart.js');
                const hasAccountingJS = html.includes('accounting.js');
                
                document.getElementById('results').innerHTML += `
                    <li>✅ accounting.html found (${html.length} bytes)</li>
                    <li>${hasSecurityJS ? '✅' : '❌'} References security.js</li>
                    <li>${hasAuditJS ? '✅' : '❌'} References audit.js</li>
                    <li>${hasChart ? '✅' : '❌'} References chart.js</li>
                    <li>${hasAccountingJS ? '✅' : '❌'} References accounting.js</li>
                `;
            })
            .catch(e => document.getElementById('results').innerHTML += `<li>❌ Error: ${e.message}</li>`);
    </script>
</body>
</html>
